name: Website checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: website-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests and production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests, type checks, and production build
        run: pnpm verify

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run desktop and mobile browser tests
        run: pnpm test:e2e

      - name: Upload browser failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: output/playwright/
          if-no-files-found: ignore
          retention-days: 7
